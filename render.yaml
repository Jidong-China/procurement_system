services:
  - type: web
    name: procurement-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: change_me_123
      - key: DATABASE_PATH
        value: data/procurement.db
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
    disk:
      name: procurement-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
